name: Test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # WTR uses system Chrome from setup-chrome; skip Puppeteer's browser download.
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2

      - name: Run tests
        run: npm test
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
